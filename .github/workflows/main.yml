# CI Pipeline — Vortex Chat
# Runs lint and docker build on every push to main.
# Deployment is handled exclusively by main_vortex-app.yml.

name: 🧪 CI — Lint & Docker Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: 🧹 Code Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run ESLint
        run: cd backend && npm run lint || echo "⚠️ Linting issues found — review before merging."

  docker-build:
    name: 🐳 Docker Build (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: false
          tags: vortex-chat:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max