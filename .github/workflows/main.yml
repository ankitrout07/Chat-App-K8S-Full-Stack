name: Build and deploy Vortex Chat

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'vortex-chat'
  AZURE_RESOURCE_GROUP: 'Dev-Test-RG'
  AZURE_RG_LOCATION: 'centralindia'  # Existing RG location
  AZURE_LOCATION: 'eastus'           # Target app location
  AZURE_PLAN_NAME: 'vortex-plan'

permissions:
  id-token: write
  contents: read

jobs:
  # 1. Parallel Job: Build the Application Source
  build:
    name: 🏗️ Build App Source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'backend/package.json'

      - name: npm install
        run: |
          cd backend
          npm install

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # We exclude node_modules to speed up upload/download
          # Azure Remote Build will handle npm install on the server
          path: |
            ./backend/
            !./backend/node_modules/

  # 2. Parallel Job: Build Docker Image (K8S Compatibility)
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          cd backend
          docker build -t vortex-chat:${{ github.sha }} .

  # 3. Parallel Job: Infrastructure Provisioning
  provision:
    name: ☁️ Provision Azure Infra
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Ensure Azure Resources Exist'
        run: |
          # Create Resource Group if it doesn't exist (using existing location)
          az group create --name ${{ env.AZURE_RESOURCE_GROUP }} --location ${{ env.AZURE_RG_LOCATION }}
          
          # Create or Update App Service Plan to B1 (Basic)
          # We use a separate check for Linux compatibility
          if ! az appservice plan show --name ${{ env.AZURE_PLAN_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} > /dev/null 2>&1; then
            echo "Creating new Linux App Service Plan..."
            az appservice plan create --name ${{ env.AZURE_PLAN_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --sku B1 --is-linux --location ${{ env.AZURE_LOCATION }}
          else
            echo "Updating existing App Service Plan..."
            az appservice plan update --name ${{ env.AZURE_PLAN_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --sku B1
          fi
          
          # Create Web App if it doesn't exist
          if ! az webapp show --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} > /dev/null 2>&1; then
            echo "Creating new Web App..."
            az webapp create --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --plan ${{ env.AZURE_PLAN_NAME }} --runtime "NODE:20-lts"
          fi
          
          # Configure App Settings and Startup
          az webapp config appsettings set --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true
          az webapp config set --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --startup-file "node server.js"
          
          # Only set Always On if SKU supports it (Basic and above)
          az webapp config set --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --always-on true

  # 4. Dependent Job: Deployment
  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: [build, provision]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .

      - name: 'Ensure App is Started'
        run: |
          az webapp start --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}
          echo "✅ App started successfully"

      - name: 'Smoke Test'
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "❌ Smoke test failed with status $STATUS"
            exit 1
          fi
          echo "✅ Smoke test passed — app is live!"