# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
name: Build and deploy Node.js app to Azure Web App - chat-app-tunnel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'chat-app-tunnel'
  AZURE_RESOURCE_GROUP: 'Dev-Test-RG'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install and build
        # Run npm commands inside the backend folder
        run: |
          cd backend
          npm install
          npm run build --if-present

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # Uploading the CONTENTS of backend
          path: ./backend/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .  # Extract to root

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8E2FC619A67D4AEF9994BACA9D686D41 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_43F2F7B7BD47486BB6FA76571543F0E9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_23CFF0B8B79D4B8A9A4BBD677620F158 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          # Use '.' because the artifact already contains the backend files
          package: . 
          startup-command: 'node server.js'
