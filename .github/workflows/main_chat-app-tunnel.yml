name: Build and deploy Node.js app to Azure Web App - chat-app-tunnel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'chat-app-tunnel'
  AZURE_RESOURCE_GROUP: 'Dev-Test-RG'
  NODE_VERSION: '24.x'

jobs:
  build:
    name: 🏗️ Build & Package
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install & Build
        working-directory: backend
        run: |
          npm ci
          npm run build --if-present
          npm test --if-present

      - name: 🧹 Prune for Production
        working-directory: backend
        run: npm prune --production

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend/
          retention-days: 1

  deploy:
    name: 🚀 Deploy to App Service
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 📥 Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: 🔑 Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ⚙️ Configure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          mask-inputs: true
          app-settings-json: |
            [
              { "name": "NODE_ENV", "value": "production", "slotSetting": false },
              { "name": "DB_HOST", "value": "chatapp-db-pg-1776761738.postgres.database.azure.com", "slotSetting": false },
              { "name": "DB_NAME", "value": "chatapp", "slotSetting": false },
              { "name": "DB_USER", "value": "ankitadmin", "slotSetting": false },
              { "name": "REDIS_HOST", "value": "${{ secrets.REDIS_HOST }}", "slotSetting": false },
              { "name": "JWT_SECRET", "value": "${{ secrets.JWT_SECRET }}", "slotSetting": false },
              { "name": "POSTGRES_PASSWORD", "value": "${{ secrets.DB_PASS }}", "slotSetting": false },
              { "name": "WEBSOCKETS_ENABLED", "value": "true", "slotSetting": false }
            ]

      - name: 🛰️ Set Subscription
        run: az account set --subscription "7ef42162-83d2-4247-8010-38bf34dd1453"

      - name: ☁️ Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ env.AZURE_RESOURCE_GROUP }}
          package: .
          startup-command: 'node server.js'
          