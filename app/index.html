<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8S Chat Pro | v14 Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-main: #020617; --bg-glass: rgba(15, 23, 42, 0.8); --accent: #2563eb; --bubble-me: #2563eb; --bubble-them: #1e293b; }
        [data-theme="light"] {
            --bg-main: #f9fafb;
            --bg-glass: rgba(255,255,255,0.8);
            --accent: #3b82f6;
            --bubble-me: #3b82f6;
            --bubble-them: #e5e7eb;
        }
        [data-theme="solar"] {
            --bg-main: #002b36;
            --bg-glass: rgba(0,43,54,0.8);
            --accent: #b58900;
            --bubble-me: #b58900;
            --bubble-them: #073642;
        }
        body { background-color: var(--bg-main); transition: background-color 0.35s ease; }

        .input {
            border-radius: 16px;
            padding: 14px 16px;
            outline: none;
            background: rgba(2, 6, 23, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.16);
        }
        .input:focus { border-color: rgba(59, 130, 246, 0.6); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.16); }

        .kbd {
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: rgba(2, 6, 23, 0.35);
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 11px;
        }
        .glass { background: var(--bg-glass); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .chat-wallpaper { background-image: url('https://w0.peakpx.com/wallpaper/508/606/HD-wallpaper-whatsapp-dark-background-whatsapp-dark-mode.jpg'); background-size: cover; background-blend-mode: overlay; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.35); border-radius: 999px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(2, 6, 23, 0.35); border-radius: 999px; }
        /* toast */
        .toast {
            position: fixed;
            top: 82px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 80;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(2, 6, 23, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.18);
            backdrop-filter: blur(12px);
            color: rgba(226, 232, 240, 0.95);
            font-size: 12px;
            display: none;
        }

        .ring-soft { box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.16) inset; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 16px;
            padding: 12px 14px;
            font-weight: 800;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
        }
        .btn:active { transform: translateY(1px); }
        .btn-primary { background: var(--accent); box-shadow: 0 14px 35px rgba(37, 99, 235, 0.28); }
        .btn-ghost { background: rgba(148, 163, 184, 0.12); }
        .btn-ghost:hover { background: rgba(148, 163, 184, 0.18); }
    </style>
</head>
<body class="h-screen text-slate-200 overflow-hidden font-sans selection:bg-blue-500/30 selection:text-slate-100">

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <nav class="glass fixed top-0 w-full h-16 z-50 flex items-center justify-between px-4 sm:px-8">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black uppercase shadow-lg shadow-blue-500/20">T</div>
            <span class="font-bold text-xl tracking-tighter uppercase">Tunnel<span class="text-blue-500">Pro</span></span>
        </div>
        <div class="hidden sm:flex gap-8">
            <button onclick="showView('home')" class="text-sm font-bold uppercase" id="nav-home">Home</button>
            <button onclick="showView('arch')" class="text-sm font-bold uppercase text-slate-400" id="nav-arch">Architecture</button>
        </div>
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
            <span id="session-count" class="text-[10px] font-black text-emerald-500 uppercase">1 Active Node</span>
            <span id="msg-count" class="text-[10px] font-black text-emerald-500 uppercase">0 msgs</span>
        </div>
        <div class="relative">
            <button id="theme-btn" class="ml-3 text-xs sm:text-sm font-black uppercase text-slate-200 btn btn-ghost px-3 py-2">Themes</button>
            <div id="theme-menu" class="hidden absolute right-0 mt-2 w-48 bg-slate-900/90 ring-soft rounded-2xl shadow-2xl p-3">
                <p class="text-[10px] font-black uppercase text-slate-400 px-2 pb-2">Theme</p>
                <label class="flex items-center gap-2 px-2 py-2 rounded-xl hover:bg-white/5 cursor-pointer"><input type="radio" name="theme" value="dark">Dark</label>
                <label class="flex items-center gap-2 px-2 py-2 rounded-xl hover:bg-white/5 cursor-pointer"><input type="radio" name="theme" value="light">Light</label>
                <label class="flex items-center gap-2 px-2 py-2 rounded-xl hover:bg-white/5 cursor-pointer"><input type="radio" name="theme" value="solar">Solar</label>
            </div>
        </div>
    </nav>

    <main class="mt-16 h-[calc(100vh-64px)]">
        <section id="view-home" class="view flex items-center justify-center min-h-full px-4">
            <div class="w-full max-w-xl bg-slate-900/35 ring-soft p-8 sm:p-10 rounded-[2.5rem] border border-white/5">
                <div class="flex items-start justify-between gap-4 mb-6">
                    <div>
                        <h2 class="text-lg sm:text-xl font-black tracking-tight">Profiles</h2>
                        <p class="text-xs text-slate-400 mt-1">Create up to 2 local profiles. Click to open chat.</p>
                    </div>
                    <div class="hidden sm:flex items-center gap-2 text-xs text-slate-400">
                        <span class="kbd">Ctrl</span><span class="kbd">K</span>
                        <span class="ml-2">Search</span>
                    </div>
                </div>

                <div id="user-list" class="space-y-3 mb-6"></div>

                <div id="add-user-container" class="flex flex-col sm:flex-row gap-3">
                    <input id="new-username" class="flex-grow input" placeholder="New profile name…">
                    <button onclick="addUser()" class="btn btn-primary sm:w-auto"><i class="fas fa-plus"></i><span class="text-xs">Add</span></button>
                </div>

                <p class="text-[11px] text-slate-500 mt-4">Tip: Press <span class="kbd">Esc</span> to close chat.</p>
            </div>
        </section>

        <section id="view-arch" class="view hidden p-10 max-w-4xl mx-auto">
            <div class="bg-slate-900 p-8 rounded-3xl border border-blue-500/20 shadow-2xl">
                <h3 class="text-xl font-bold mb-4 text-blue-400"><i class="fas fa-server mr-2"></i>Infrastructure Log</h3>
                <p class="text-sm text-slate-400 mb-2">● Real-time sync via WebSocket Events</p>
                <p class="text-sm text-slate-400 mb-2">● Atomic Database Operations (PostgreSQL)</p>
                <p class="text-sm text-slate-400">● Pod Health: <span class="text-emerald-500 font-bold">OPTIMAL</span></p>
            </div>
        </section>
    </main>

        <div id="chat-section" class="hidden fixed inset-0 z-[60] flex flex-col h-full bg-[var(--bg-main)]" data-theme="dark">
        <header class="p-4 glass flex justify-between items-center shadow-lg">
            <button id="clear-chat" class="text-slate-400 hover:text-red-400 p-2"><i class="fas fa-trash-alt"></i></button>
            <div class="flex items-center gap-3">
                <div id="current-avatar" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold">?</div>
                <div>
                    <h1 class="font-bold text-lg" id="current-display-name">Username</h1>
                    <p id="typing-indicator" class="text-[10px] text-blue-400 font-black uppercase opacity-0">Typing...</p>
                </div>
            </div>
            <button onclick="closeChat()" class="text-slate-400 hover:text-red-400 p-2"><i class="fas fa-times text-xl"></i></button>
        </header>
        <!-- search/filter bar -->
        <div class="p-3 bg-slate-900/70 border-b border-white/5">
            <div class="max-w-5xl mx-auto flex items-center gap-3">
                <div class="flex-grow relative">
                    <i class="fas fa-magnifying-glass text-slate-500 absolute left-3 top-1/2 -translate-y-1/2 text-xs"></i>
                    <input id="search" class="w-full input pl-9 text-sm" placeholder="Search messages… (Ctrl+K)">
                </div>
                <button id="jump-bottom" class="btn btn-ghost px-3 py-2" title="Jump to latest"><i class="fas fa-arrow-down"></i></button>
            </div>
        </div>
        <main id="messages" class="flex-grow p-6 space-y-4 overflow-y-auto chat-wallpaper custom-scrollbar"></main>
        <footer class="p-4 glass">
            <form id="form" class="max-w-5xl mx-auto flex gap-3">
                <input id="input" autocomplete="off" class="flex-grow input" placeholder="Send message…">
                <button id="send-btn" class="btn btn-primary w-14" title="Send"><i class="fas fa-paper-plane"></i></button>
            </form>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        // theme support and persistence
        const themes = {
            dark: {
                '--bg-main': '#020617',
                '--bg-glass': 'rgba(15, 23, 42, 0.8)',
                '--accent': '#2563eb',
                '--bubble-me': '#2563eb',
                '--bubble-them': '#1e293b',
                wallpaper: 'https://w0.peakpx.com/wallpaper/508/606/HD-wallpaper-whatsapp-dark-background-whatsapp-dark-mode.jpg'
            },
            light: {
                '--bg-main': '#f9fafb',
                '--bg-glass': 'rgba(255,255,255,0.8)',
                '--accent': '#3b82f6',
                '--bubble-me': '#3b82f6',
                '--bubble-them': '#e5e7eb',
                wallpaper: 'https://www.transparenttextures.com/patterns/bright-squares.png'
            },
            solar: {
                '--bg-main': '#002b36',
                '--bg-glass': 'rgba(0,43,54,0.8)',
                '--accent': '#b58900',
                '--bubble-me': '#b58900',
                '--bubble-them': '#073642',
                wallpaper: 'https://www.transparenttextures.com/patterns/diagonal-noise.png'
            }
        };
        function applyTheme(name) {
            const root = document.getElementById('chat-section');
            root.setAttribute('data-theme', name);
            const vars = themes[name];
            if (vars) {
                for (const k in vars) {
                    if (k === 'wallpaper') {
                        document.querySelectorAll('.chat-wallpaper').forEach(el => {
                            el.style.backgroundImage = `url('${vars.wallpaper}')`;
                        });
                    } else {
                        document.documentElement.style.setProperty(k, vars[k]);
                    }
                }
            }
            localStorage.setItem('chat-theme', name);
            document.querySelectorAll('#theme-menu input').forEach(i => i.checked = (i.value === name));
        }
        document.getElementById('theme-btn').addEventListener('click', () => {
            document.getElementById('theme-menu').classList.toggle('hidden');
        });
        document.addEventListener('click', (e) => {
            if (!document.getElementById('theme-menu').contains(e.target) && e.target.id !== 'theme-btn') {
                document.getElementById('theme-menu').classList.add('hidden');
            }
        });
        document.querySelectorAll('#theme-menu input').forEach(i => {
            i.addEventListener('change', () => applyTheme(i.value));
        });
        const savedTheme = localStorage.getItem('chat-theme') || 'dark';
        applyTheme(savedTheme);

        let currentUser = null;
        let users = JSON.parse(localStorage.getItem('k8s_private_users') || '[]');
        let typingTimeout;

        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.style.display = 'block';
            clearTimeout(el._t);
            el._t = setTimeout(() => (el.style.display = 'none'), 1800);
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + viewId).classList.remove('hidden');

            // nav color state
            document.getElementById('nav-home').classList.toggle('text-slate-400', viewId !== 'home');
            document.getElementById('nav-arch').classList.toggle('text-slate-400', viewId !== 'arch');
        }

        function login(name) {
            currentUser = name;
            document.getElementById('chat-section').classList.remove('hidden');
            document.getElementById('current-display-name').innerText = name;
            document.getElementById('current-avatar').innerText = name[0].toUpperCase();
            document.getElementById('input').focus();
            toast(`Signed in as ${name}`);
            document.getElementById('search').value = '';
            filterMessages();
        }

        function closeChat() { document.getElementById('chat-section').classList.add('hidden'); }

        function renderUsers() {
            const list = document.getElementById('user-list');
            document.getElementById('add-user-container').style.display = users.length >= 2 ? 'none' : 'flex';
            list.innerHTML = users.map(u => `
                <div class="flex items-center justify-between bg-slate-900/60 p-5 rounded-3xl border border-white/5 hover:border-blue-500 cursor-pointer shadow-sm" data-username="${u.replace(/"/g, '&quot;')}">
                    <div class="flex items-center gap-4"><div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-bold">${u[0].toUpperCase()}</div><span>${u}</span></div>
                    <button class="text-slate-600 hover:text-red-400 delete-user-btn" data-username="${u.replace(/"/g, '&quot;')}"><i class="fas fa-trash-alt"></i></button>
                </div>`).join('');
            
            // Add event listeners instead of inline onclick
            list.querySelectorAll('.flex.items-center.justify-between').forEach(div => {
                div.addEventListener('click', () => login(div.dataset.username));
            });
            list.querySelectorAll('.delete-user-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteUser(btn.dataset.username);
                });
            });
        }

        function addUser() {
            const inputEl = document.getElementById('new-username');
            const name = inputEl.value.trim();
            if (!name) return toast('Enter a profile name');
            if (users.length >= 2) return toast('Only 2 profiles allowed');
            users.push(name);
            localStorage.setItem('k8s_private_users', JSON.stringify(users));
            inputEl.value = '';
            renderUsers();
            toast('Profile added');
        }

        function deleteUser(name) { users = users.filter(u => u !== name); localStorage.setItem('k8s_private_users', JSON.stringify(users)); renderUsers(); }

        const input = document.getElementById('input');
        input.addEventListener('input', () => {
            socket.emit('typing', { user: currentUser, isTyping: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => socket.emit('typing', { user: currentUser, isTyping: false }), 2000);
        });

        document.getElementById('form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                socket.emit('chat message', { user: currentUser, text: input.value, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
                input.value = '';
                socket.emit('typing', { user: currentUser, isTyping: false });
            }
        });

        function deleteMessage(msgId) { socket.emit('delete message', msgId); }

        socket.on('typing', (data) => { if (data.user !== currentUser) document.getElementById('typing-indicator').style.opacity = data.isTyping ? '1' : '0'; });

        socket.on('delete message', (msgId) => {
            const el = document.getElementById('msg-' + msgId);
            if (el) el.remove();
        });

        socket.on('chat message', (data) => {
            const messages = document.getElementById('messages');
            const isMe = data.sender === currentUser;
            const msgEl = document.createElement('div');
            msgEl.id = 'msg-' + data.id;
            msgEl.dataset.msgId = data.id;
            msgEl.className = `flex ${isMe ? 'justify-end' : 'justify-start'} group`;
            msgEl.innerHTML = `
                <div class="relative flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[80%]" data-msg-id="${data.id}">
                    <div class="${isMe ? 'bg-blue-600 rounded-tr-none' : 'bg-slate-800 rounded-tl-none'} p-4 rounded-2xl shadow-xl">
                        <p class="text-sm">${data.text}</p>
                        <p class="text-[9px] font-bold mt-1 text-right opacity-50">${data.time}</p>
                    </div>
                    <div class="status text-[9px] text-slate-400 mt-1"></div>
                    ${isMe ? `<button class="delete-msg-btn absolute -left-8 top-1/2 -translate-y-1/2 text-slate-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all" data-msg-id="${data.id}"><i class="fas fa-trash-alt text-xs"></i></button>` : ''}
                </div>`;
            messages.appendChild(msgEl);
            
            // observe for read receipts
            observeMessage(msgEl);
            filterMessages();
            updateMessageCount();

            // Add event listener to delete button if it exists
            const deleteBtn = msgEl.querySelector('.delete-msg-btn');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', () => deleteMessage(data.id));
            }
            
            // When message arrives, if it's not ours notify delivered immediately
            if (!isMe) {
                socket.emit('message delivered', data.id);
            }

            messages.scrollTop = messages.scrollHeight;
        });

        // search/filter functionality
        const searchInput = document.getElementById('search');
        searchInput.addEventListener('input', filterMessages);

        function filterMessages() {
            const term = searchInput.value.toLowerCase();
            document.querySelectorAll('#messages .relative').forEach(msg => {
                const text = msg.innerText.toLowerCase();
                msg.style.display = text.includes(term) ? '' : 'none';
            });
            updateMessageCount();
        }

        function updateMessageCount() {
            const count = document.querySelectorAll('#messages .relative').length;
            document.getElementById('msg-count').innerText = `${count} msgs`;
        }

        // infinite scroll & message loading
        const messagesContainer = document.getElementById('messages');
        let offset = 0;
        const limit = 50;
        let fetching = false;

        async function loadMessages() {
            if (fetching) return;
            fetching = true;
            const res = await fetch(`/messages?limit=${limit}&offset=${offset}`);
            const data = await res.json();
            if (data.length === 0) {
                fetching = false;
                return;
            }
            // older messages come first once reversed
            data.reverse().forEach(msg => prependMessage(msg));
            offset += data.length;
            fetching = false;
        }

        function prependMessage(data) {
            const isMe = data.sender === currentUser;
            const msgEl = document.createElement('div');
            msgEl.id = 'msg-' + data.id;
            msgEl.dataset.msgId = data.id;
            msgEl.className = `flex ${isMe ? 'justify-end' : 'justify-start'} group`;
            msgEl.innerHTML = `
                <div class="relative flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[80%]" data-msg-id="${data.id}">
                    <div class="${isMe ? 'bg-blue-600 rounded-tr-none' : 'bg-slate-800 rounded-tl-none'} p-4 rounded-2xl shadow-xl">
                        <p class="text-sm">${data.text}</p>
                        <p class="text-[9px] font-bold mt-1 text-right opacity-50">${data.time}</p>
                    </div>
                    <div class="status text-[9px] text-slate-400 mt-1"></div>
                </div>`;
            messagesContainer.prepend(msgEl);
            observeMessage(msgEl);
            updateStatusFromData(msgEl, data);
            // mark as delivered for messages that aren't ours
            if (!isMe) {
                socket.emit('message delivered', data.id);
            }
            filterMessages();
            updateMessageCount();
        }

        messagesContainer.addEventListener('scroll', () => {
            if (messagesContainer.scrollTop < 100) {
                loadMessages();
            }
        });

        function updateStatusFromData(el, data) {
            const statusEl = el.querySelector('.status');
            if (data.read_at) {
                statusEl.textContent = 'Read';
            } else if (data.delivered_at) {
                statusEl.textContent = 'Delivered';
            }
        }

        // delivery/read observation
        const intersectionObserver = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting && !entry.target.dataset.read) {
                    entry.target.dataset.read = 'true';
                    const msgId = entry.target.dataset.msgId;
                    socket.emit('message read', msgId);
                }
            });
        }, { root: messagesContainer, threshold: 1.0 });

        function observeMessage(el) {
            const inner = el.querySelector('.relative');
            if (inner) {
                intersectionObserver.observe(inner);
            }
        }

        // handle delivered/read updates from server
        socket.on('message delivered', (msgId) => {
            const el = document.querySelector(`[data-msg-id="${msgId}"] .status`);
            if (el) el.textContent = 'Delivered';
        });
        socket.on('message read', (msgId) => {
            const el = document.querySelector(`[data-msg-id="${msgId}"] .status`);
            if (el) el.textContent = 'Read';
        });

        // handle clear chat broadcast
        socket.on('clear chat', () => {
            document.getElementById('messages').innerHTML = '';
            updateMessageCount();
        });

        // keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeChat();
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
                e.preventDefault();
                const chatOpen = !document.getElementById('chat-section').classList.contains('hidden');
                if (chatOpen) document.getElementById('search').focus();
            }
        });

        // jump to bottom
        document.getElementById('jump-bottom').addEventListener('click', () => {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });

        renderUsers();
        // attach clear chat button logic
        document.getElementById('clear-chat').addEventListener('click', () => {
            if (confirm('Clear all messages?')) {
                socket.emit('clear chat');
                document.getElementById('messages').innerHTML = '';
                updateMessageCount();
                toast('Chat cleared');
            }
        });
        // load initial batch of messages then scroll to bottom
        loadMessages().then(() => { messagesContainer.scrollTop = messagesContainer.scrollHeight; });
    </script>
</body>
</html>
