<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Chat | Auth Gatekeeper</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #030712;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            position: relative;
            overflow: hidden;
        }
        .bg-accents {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .bg-accents::before, .bg-accents::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: pulse 10s infinite alternate;
        }
        .bg-accents::before {
            width: 500px;
            height: 500px;
            background: #6366f1;
            top: -100px;
            left: -100px;
        }
        .bg-accents::after {
            width: 400px;
            height: 400px;
            background: #06b6d4;
            bottom: -50px;
            right: -50px;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.1; }
            100% { transform: scale(1.2); opacity: 0.2; }
        }
        #auth-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .brand-logo {
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 2rem;
        }
        .brand-logo span {
            color: #818cf8;
        }
        input {
            width: 100%;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #818cf8;
            background: rgba(255, 255, 255, 0.05);
        }
        .btn-primary {
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.5);
        }
        p {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }
        p span {
            color: #818cf8;
            font-weight: bold;
            cursor: pointer;
        }
        p span:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="bg-accents"></div>
    <div id="auth-container" class="glass-panel">
        <h1 class="brand-logo">VORTEX<span>CHAT</span></h1>
        
        <div id="login-form">
            <input type="email" id="login-email" placeholder="Email" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button onclick="handleLogin()" class="btn-primary">Initialize Session</button>
            <p>New to Vortex? <span onclick="toggleAuth()">Register</span></p>
        </div>

        <div id="signup-form" style="display: none;">
            <input type="text" id="reg-username" placeholder="Username" required>
            <input type="email" id="reg-email" placeholder="Email" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <button onclick="handleSignup()" class="btn-primary">Create Identity</button>
            <p>Already have a session? <span onclick="toggleAuth()">Login</span></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
